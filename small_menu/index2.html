<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olea | Mediterranean Kitchen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --clay: #bc6c25;
            --olive: #606c38;
            --sand: #fefae0;
            --earth: #283618;
        }

        body { 
            background-color: var(--sand); 
            color: var(--earth);
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        h1, h2, h3, .serif { font-family: 'DM Serif Display', serif; }

        .menu-btn.active {
            background-color: var(--olive);
            color: white;
            transform: scale(1.05);
        }

        .menu-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-terracotta { background-color: var(--clay); }
        .text-olive { color: var(--olive); }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 bg-[#fefae0]/90 backdrop-blur-md border-b border-olive/10 px-6 py-4 flex justify-between items-center">
        <div class="text-3xl font-bold text-olive serif">Olea</div>
        <div class="flex gap-6 items-center">
            <a href="#menu" class="hidden md:block text-sm font-semibold hover:text-clay transition">The Menu</a>
            <button onclick="toggleModal()" class="bg-terracotta text-white px-6 py-2 rounded-full text-sm font-bold shadow-lg hover:opacity-90 transition">
                Book Table
            </button>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-6 text-center">
        <div class="max-w-3xl mx-auto">
            <span class="text-olive font-bold tracking-widest uppercase text-xs">Family Owned • Fresh Ingredients</span>
            <h1 class="text-6xl md:text-8xl mt-4 mb-8 text-earth">Flavors of the <span class="text-clay italic">Coast.</span></h1>
            <p class="text-lg text-earth/70 leading-relaxed mb-10">
                Simple recipes, sun-ripened vegetables, and the finest olive oil. 
                Welcome to our table.
            </p>
        </div>
        <div class="grid grid-cols-3 gap-2 max-w-5xl mx-auto rounded-3xl overflow-hidden h-[400px]">
            <img src="https://images.unsplash.com/photo-1544124499-58912cbddaad?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Food">
            <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Ambiance">
            <img src="https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Plate">
        </div>
    </section>

    <section id="menu" class="py-20 bg-white/50">
        <div class="max-w-5xl mx-auto px-6">
            <div class="text-center mb-12">
                <h2 class="text-5xl mb-6 serif">On the Menu</h2>
                
                <div class="flex flex-wrap justify-center gap-4 mb-12">
                    <button onclick="filterMenu('all')" class="menu-btn active px-8 py-2 rounded-full border border-olive/20 text-sm font-bold transition">All</button>
                    <button onclick="filterMenu('starters')" class="menu-btn px-8 py-2 rounded-full border border-olive/20 text-sm font-bold transition">Starters</button>
                    <button onclick="filterMenu('mains')" class="menu-btn px-8 py-2 rounded-full border border-olive/20 text-sm font-bold transition">Mains</button>
                    <button onclick="filterMenu('desserts')" class="menu-btn px-8 py-2 rounded-full border border-olive/20 text-sm font-bold transition">Desserts</button>
                </div>
            </div>

            <div id="menu-grid" class="grid md:grid-cols-2 gap-x-12 gap-y-8">
                </div>
        </div>
    </section>

    <footer class="bg-earth text-[#fefae0] py-16 px-6 text-center">
        <h3 class="serif text-4xl mb-4 text-clay">Visit Us</h3>
        <p class="mb-2">123 Olive Grove Lane, Valencia</p>
        <p class="opacity-70 text-sm italic mb-8">Tue - Sun: 12:00 - 22:00</p>
        <div class="flex justify-center gap-4">
            <i data-lucide="instagram" class="w-5 h-5 cursor-pointer hover:text-clay transition"></i>
            <i data-lucide="facebook" class="w-5 h-5 cursor-pointer hover:text-clay transition"></i>
        </div>
    </footer>

    <div id="reserve-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-6">
        <div class="absolute inset-0 bg-earth/60 backdrop-blur-sm" onclick="toggleModal()"></div>
        <div class="relative bg-[#fefae0] p-10 rounded-3xl max-w-md w-full shadow-2xl">
            <h2 class="serif text-3xl mb-4">Reserve a Table</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Your Name" class="w-full p-3 rounded-xl border border-olive/20 bg-white outline-none focus:border-clay">
                <input type="date" class="w-full p-3 rounded-xl border border-olive/20 bg-white outline-none focus:border-clay">
                <button type="button" onclick="toggleModal()" class="w-full py-4 bg-terracotta text-white rounded-xl font-bold">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const menuData = [
            { id: 1, category: 'starters', name: 'Fresh Gazpacho', price: '€8', desc: 'Cold tomato soup with cucumber and local oil.' },
            { id: 2, category: 'starters', name: 'Grilled Halloumi', price: '€11', desc: 'Honey-glazed with fresh mint.' },
            { id: 3, category: 'mains', name: 'Seafood Paella', price: '€22', desc: 'Fresh from the market, saffron-infused rice.' },
            { id: 4, category: 'mains', name: 'Lamb Souvlaki', price: '€19', desc: 'Skewered lamb with handmade pita and tzatziki.' },
            { id: 5, category: 'desserts', name: 'Greek Baklava', price: '€7', desc: 'Layers of filo, nuts, and honey syrup.' },
            { id: 6, category: 'desserts', name: 'Tiramisu della Nonna', price: '€9', desc: 'The classic, made with love.' }
        ];

        function filterMenu(category) {
            // Update Buttons
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === category) btn.classList.add('active');
                if(category === 'all' && btn.innerText === 'All') btn.classList.add('active');
            });

            const grid = document.getElementById('menu-grid');
            const filtered = category === 'all' ? menuData : menuData.filter(item => item.category === category);

            // Animate out
            gsap.to("#menu-grid", { opacity: 0, y: 10, duration: 0.2, onComplete: () => {
                grid.innerHTML = filtered.map(item => `
                    <div class="menu-card border-b border-olive/10 pb-4">
                        <div class="flex justify-between items-end mb-1">
                            <h3 class="text-xl font-bold text-earth">${item.name}</h3>
                            <span class="text-clay font-bold">${item.price}</span>
                        </div>
                        <p class="text-sm text-earth/60 italic">${item.desc}</p>
                    </div>
                `).join('');
                // Animate in
                gsap.to("#menu-grid", { opacity: 1, y: 0, duration: 0.4 });
            }});
        }

        function toggleModal() {
            const modal = document.getElementById('reserve-modal');
            if(modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                gsap.fromTo(modal.querySelector('.relative'), { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.3 });
            } else {
                gsap.to(modal.querySelector('.relative'), { scale: 0.8, opacity: 0, duration: 0.2, onComplete: () => modal.classList.add('hidden') });
            }
        }

        // Init Menu
        filterMenu('all');
    </script>
</body>
</html>
