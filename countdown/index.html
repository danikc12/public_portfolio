<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manchester Awaits</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        'manc-gold': '#D4AF37',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        /* Cinematic Background Animation */
        .ken-burns-bg {
            position: absolute;
            inset: -5%;
            background-image: url('manchester.jpeg');
            background-size: cover;
            background-position: center;
            animation: kenBurns 30s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes kenBurns {
            0% { transform: scale(1); }
            100% { transform: scale(1.15) translate(-1%, -1%); }
        }

        /* Frosted Glass Effect - Main Card Only */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.02);
        }

        /* Golden Magic Particles */
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.8) 0%, rgba(212, 175, 55, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: floatUp linear forwards;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        /* Elegant Hover Glow for Numbers */
        .time-box span:first-child {
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }
        .time-box:hover span:first-child {
            color: #D4AF37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* Staggered Fade In */
        .fade-up { opacity: 0; animation: fadeUp 1s ease-out forwards; }
        .delay-1 { animation-delay: 0.3s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="h-[100dvh] w-screen relative flex items-center justify-center">

    <div class="ken-burns-bg"></div>

    <div class="absolute inset-0 bg-gradient-to-br from-black/80 via-black/60 to-black/90 z-0"></div>

    <div id="particle-container" class="absolute inset-0 overflow-hidden z-10 pointer-events-none"></div>

    <div class="glass-card relative z-20 p-5 sm:p-10 md:p-16 rounded-3xl w-[95%] sm:w-[90%] max-w-5xl text-center flex flex-col items-center">
        
        <div class="w-full">
            <div class="mb-6 md:mb-10 fade-up flex flex-col items-center">
                
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="w-10 h-10 md:w-12 md:h-12 text-manc-gold fill-current mb-3 transition-transform duration-500 hover:scale-125 cursor-pointer">
                    <path d="M500.5 158.4c-6.8-14.7-21-25-37.9-27.1-28.7-3.6-58.4 4.5-83.5 22.9-10.4 7.6-20.2 16.5-29.2 26.4-19.1-15.6-40.4-27.6-63.5-35.3V106.1c0-17.7-14.3-32-32-32H258.1c-17.7 0-32 14.3-32 32v39.2c-23.1 7.7-44.4 19.7-63.5 35.3-9-9.9-18.8-18.8-29.2-26.4-25.1-18.4-54.8-26.5-83.5-22.9-16.9 2.1-31.1 12.4-37.9 27.1-7.8 16.8-6.1 36.8 4.7 52.2 19.2 27.2 49 46.1 82.5 52.5 3.3.6 6.8 1.1 10.3 1.5-6.5 15.3-10.3 32-10.3 49.5 0 25.1 7.3 48.6 19.8 68.6 11.2 18 26.5 32.8 44.8 43.1 16.8 9.5 36.3 14.8 56.9 14.8 20.6 0 40.1-5.3 56.9-14.8 18.3-10.3 33.6-25.1 44.8-43.1 12.5-20 19.8-43.5 19.8-68.6 0-17.5-3.8-34.2-10.3-49.5 3.5-.4 7-1 10.3-1.5 33.5-6.4 63.3-25.3 82.5-52.5 10.8-15.4 12.5-35.4 4.7-52.2zM122.9 248.8c-17.3-3.3-33.1-11.8-45.7-24.1-6.1-6-6.8-15.6-1.7-22.3 2.1-2.8 5.7-4.7 9.5-5.2 14.1-1.8 28.5 2 40.7 10.9 22.8 16.7 39.7 40.6 48.5 67.8-17.6-5.8-34.4-15.1-49.3-27.1h-2zm133.2 137.6c-20 0-38.4-9.6-49.9-25.7-7-9.8-11.7-21.4-13.6-33.8h127c-1.9 12.4-6.6 24-13.6 33.8-11.5 16.1-29.9 25.7-49.9 25.7zm63.5-102.7H192.5c1.8-13 6.6-25 13.9-35.5 11.7-16.7 30.2-26.6 50.4-26.6 20.2 0 38.7 9.9 50.4 26.6 7.3 10.5 12.1 22.5 13.9 35.5zm43.5-7.3c8.8-27.2 25.7-51.1 48.5-67.8 12.2-8.9 26.6-12.7 40.7-10.9 3.8.5 7.4 2.4 9.5 5.2 5.1 6.7 4.4 16.3-1.7 22.3-12.6 12.3-28.4 20.8-45.7 24.1-14.9 12-31.7 21.3-49.3 27.1h-2z"/>
                </svg>
                
                <h2 class="text-manc-gold uppercase tracking-[0.2em] md:tracking-[0.4em] text-[9px] sm:text-xs md:text-sm font-light mb-2">
                    Anticipating the arrival
                </h2>
                <h1 class="font-serif text-4xl sm:text-5xl md:text-7xl lg:text-8xl text-white font-normal tracking-wide mb-5 md:mb-8">
                    Manchester
                </h1>
                <div class="w-16 md:w-24 h-[1px] bg-gradient-to-r from-transparent via-manc-gold to-transparent mx-auto"></div>
            </div>

            <div class="grid grid-cols-4 gap-2 sm:gap-4 md:gap-8 w-full fade-up delay-1">
                
                <div class="time-box flex flex-col items-center p-1 sm:p-4 cursor-default">
                    <span id="days" class="font-sans text-3xl sm:text-5xl md:text-7xl lg:text-8xl font-light text-white mb-1 md:mb-2 leading-none">00</span>
                    <span class="font-sans text-[7px] sm:text-[10px] md:text-xs font-light text-white/50 uppercase tracking-[0.1em] sm:tracking-[0.2em]">Days</span>
                </div>
                
                <div class="time-box flex flex-col items-center p-1 sm:p-4 cursor-default">
                    <span id="hours" class="font-sans text-3xl sm:text-5xl md:text-7xl lg:text-8xl font-light text-white mb-1 md:mb-2 leading-none">00</span>
                    <span class="font-sans text-[7px] sm:text-[10px] md:text-xs font-light text-white/50 uppercase tracking-[0.1em] sm:tracking-[0.2em]">Hours</span>
                </div>
                
                <div class="time-box flex flex-col items-center p-1 sm:p-4 cursor-default">
                    <span id="minutes" class="font-sans text-3xl sm:text-5xl md:text-7xl lg:text-8xl font-light text-white mb-1 md:mb-2 leading-none">00</span>
                    <span class="font-sans text-[7px] sm:text-[10px] md:text-xs font-light text-white/50 uppercase tracking-[0.1em] sm:tracking-[0.2em]">Mins</span>
                </div>
                
                <div class="time-box flex flex-col items-center p-1 sm:p-4 cursor-default">
                    <span id="seconds" class="font-sans text-3xl sm:text-5xl md:text-7xl lg:text-8xl font-light text-white mb-1 md:mb-2 leading-none">00</span>
                    <span class="font-sans text-[7px] sm:text-[10px] md:text-xs font-light text-white/50 uppercase tracking-[0.1em] sm:tracking-[0.2em]">Secs</span>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🗓️ SET YOUR TARGET DATE & TIME HERE 
        // ==========================================
        const targetDate = new Date("2026-05-28T22:45:00").getTime();

        // ⏱️ Countdown Logic
        const countdown = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(countdown);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }, 1000);

        // ✨ Golden Particle Generator (Magic Rain)
        const particleContainer = document.getElementById('particle-container');
        
        function createParticle() {
            if (window.innerWidth < 768 && document.querySelectorAll('.particle').length > 15) return;

            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const size = Math.random() * 6 + 2; 
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            
            const duration = Math.random() * 5 + 5; 
            particle.style.animationDuration = `${duration}s`;
            
            particleContainer.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }

        setInterval(createParticle, 400);
    </script>
</body>
</html>
